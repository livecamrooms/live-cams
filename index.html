<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chaturbate - Free Live Sex Cams & Adult Chat</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font {
            font-family: system-ui, -apple-system, sans-serif;
            letter-spacing: -2.5px;
        }
        .card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover {
            transform: scale(1.05);
            z-index: 20;
        }
        .thumbnail-container {
            position: relative;
        }
        .thumbnail-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 55%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
        .masonry-grid {
            column-count: 2;
            column-gap: 16px;
        }
        @media (min-width: 640px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 768px) { .masonry-grid { column-count: 4; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 5; } }
        @media (min-width: 1280px) { .masonry-grid { column-count: 6; } }
        .room-card { break-inside: avoid; margin-bottom: 16px; }
        .cb-pink { color: #ff2a6d; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-white">
    <!-- Top Navigation (same as before) -->
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto">
            <div class="px-4 py-3.5 flex items-center justify-between">
                <div onclick="location.reload()" class="logo-font text-4xl font-black tracking-tighter cursor-pointer cb-pink flex items-center gap-1">
                    chaturbate
                </div>

                <div class="flex-1 max-w-2xl mx-8">
                    <div class="relative">
                        <input id="search-input" type="text" placeholder="Search models, tags..." 
                               class="w-full bg-zinc-900 border border-zinc-700 focus:border-pink-500 rounded-2xl py-3.5 px-5 pl-12 text-sm outline-none">
                        <i class="fa-solid fa-magnifying-glass absolute left-5 top-4 text-zinc-400"></i>
                    </div>
                </div>

                <div class="flex items-center gap-6 text-sm font-medium">
                    <a href="#" class="hover:text-pink-400 transition-colors">Broadcast Yourself</a>
                    <a href="https://chaturbate.com" target="_blank" class="text-pink-400 hover:text-pink-300">Join Now</a>
                </div>
            </div>
        </div>

        <!-- Gender Tabs -->
        <div class="bg-black border-t border-zinc-800">
            <div class="max-w-screen-2xl mx-auto px-4">
                <div class="flex items-center gap-1 overflow-x-auto py-2 text-sm font-medium no-scrollbar">
                    <button onclick="filterByGender('all')" id="filter-all" class="gender-tab active px-6 py-2 rounded-xl whitespace-nowrap">All</button>
                    <button onclick="filterByGender('f')" id="filter-f" class="gender-tab px-6 py-2 rounded-xl whitespace-nowrap flex items-center gap-1.5"><span class="text-pink-400">♀</span> Female</button>
                    <button onclick="filterByGender('m')" id="filter-m" class="gender-tab px-6 py-2 rounded-xl whitespace-nowrap flex items-center gap-1.5"><span class="text-blue-400">♂</span> Male</button>
                    <button onclick="filterByGender('c')" id="filter-c" class="gender-tab px-6 py-2 rounded-xl whitespace-nowrap">Couple</button>
                    <button onclick="filterByGender('t')" id="filter-t" class="gender-tab px-6 py-2 rounded-xl whitespace-nowrap">Trans</button>
                    
                    <div class="ml-auto flex items-center gap-2 text-xs text-zinc-400">
                        <span class="text-green-400">●</span>
                        <span id="online-total" class="font-mono font-bold text-lg text-white">0</span>
                        <span>online now</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-4 py-8">
        <div id="featured" class="mb-12">
            <h2 class="text-2xl font-semibold mb-5 flex items-center gap-3"><span class="text-pink-400">★</span> Featured Live</h2>
            <div id="hero-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4"></div>
        </div>

        <div class="flex items-center justify-between mb-6">
            <h2 class="text-3xl font-semibold">Live Rooms</h2>
            <button onclick="loadRooms()" class="flex items-center gap-2 text-zinc-400 hover:text-white transition-colors">
                <i class="fa-solid fa-sync"></i> <span>Refresh</span>
            </button>
        </div>

        <div id="rooms-grid" class="masonry-grid"></div>

        <div class="flex justify-center mt-16">
            <button onclick="loadMore()" class="px-14 py-5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium text-lg border border-zinc-700 hover:border-zinc-500 transition-all active:scale-95">
                Load More Cams
            </button>
        </div>
    </div>

    <script>
        let allRooms = [];
        let filteredRooms = [];
        let displayed = 60;
        let currentGender = 'all';
        let searchTerm = '';

        const WM_ID = 'T2CSW';   // ← Your affiliate code

        async function loadRooms() {
            try {
                const ip = await getClientIP();
                const url = `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${WM_ID}&client_ip=${ip}&limit=500`;
                
                const res = await fetch(url);
                const data = await res.json();

                allRooms = data.results || [];
                
                // Update live counter
                const total = allRooms.length;
                document.getElementById('online-total').textContent = total.toLocaleString();

                applyFilters();
            } catch (err) {
                console.error("API Error:", err);
                alert("Failed to load cams. Please try again later.");
            }
        }

        async function getClientIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch {
                return '8.8.8.8'; // fallback
            }
        }

        function renderRooms(containerId, rooms, limit) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            const toShow = rooms.slice(0, limit || rooms.length);

            toShow.forEach(room => {
                const div = document.createElement('div');
                div.className = `room-card bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden cursor-pointer card`;
                
                const thumb = room.image_url_360x270 || room.image_url || `https://thumb.live.mmcdn.com/ri/${room.username}.jpg`;
                
                div.innerHTML = `
                    <div class="thumbnail-container">
                        <img src="${thumb}" loading="lazy" class="w-full aspect-video object-cover"
                             onerror="this.src='https://picsum.photos/id/${100 + Math.floor(Math.random()*80)}/640/360'">
                        
                        <div class="absolute top-3 left-3 bg-black/80 text-[10px] px-2.5 py-0.5 rounded flex items-center gap-1 font-mono">
                            <span class="text-green-400">●</span> ${(room.num_users/1000).toFixed(1)}k
                        </div>
                    </div>
                    <div class="p-4">
                        <div class="font-semibold text-lg">${room.username}</div>
                        <div class="text-zinc-400 text-sm line-clamp-2 mt-1 min-h-[42px]">${room.room_subject || 'No description'}</div>
                        <div class="flex justify-between items-center text-xs mt-4 text-zinc-500">
                            <span>${room.age ? room.age : '?'} • ${room.gender.toUpperCase()}</span>
                            <span class="text-emerald-400 font-medium">${room.num_users.toLocaleString()}</span>
                        </div>
                    </div>
                `;
                
                div.onclick = () => {
                    window.open(room.chat_room_url_revshare || `https://chaturbate.com/${room.username}/`, '_blank');
                };
                
                container.appendChild(div);
            });
        }

        function filterByGender(gender) {
            currentGender = gender;
            document.querySelectorAll('.gender-tab').forEach(tab => {
                tab.classList.toggle('active', 
                    (gender === 'all' && tab.id === 'filter-all') || tab.id === `filter-${gender}`);
            });
            applyFilters();
        }

        function applyFilters() {
            filteredRooms = allRooms.filter(room => {
                const genderMatch = currentGender === 'all' || room.gender === currentGender;
                const searchMatch = !searchTerm || 
                    room.username.toLowerCase().includes(searchTerm) ||
                    (room.room_subject && room.room_subject.toLowerCase().includes(searchTerm));
                return genderMatch && searchMatch;
            });
            displayed = 60;
            renderRooms('rooms-grid', filteredRooms, displayed);
            renderRooms('hero-grid', filteredRooms, 5);
        }

        function loadMore() {
            displayed += 40;
            renderRooms('rooms-grid', filteredRooms, displayed);
        }

        // Search
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase().trim();
            applyFilters();
        });

        // Initialize
        window.onload = () => {
            loadRooms();
        };
    </script>
</body>
</html>
